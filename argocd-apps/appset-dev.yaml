apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-apps-onboarding
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/vedantaggrawal/repo-app-gitops.git
        revision: main
        directories:
          - path: 'apps/*/dev'
  template:
    metadata:
      name: 'dev-{{path[1]}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/vedantaggrawal/repo-helm-chart.git
          path: .
          targetRevision: HEAD
          helm:
            valueFiles:
              - $values/{{path}}/values.yaml
        - repoURL: https://github.com/vedantaggrawal/repo-app-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path[1]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
